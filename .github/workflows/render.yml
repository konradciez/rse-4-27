name: test

on:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest

    steps: 
      - uses: actions/checkout@v6
      - uses: quarto-dev/quarto-actions/setup@v2
      - uses: quarto-dev/quarto-actions/render@v2

      - uses: actions/upload-artifact@7
        with:
          name: pdf-${{ matrix.os }}
          path: example-${{ matrix.os }}.pdf
      
